name: Data Drift Monitoring

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  drift-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run drift report
        run: uv run python scripts/monitor.py

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: outputs/monitoring/drift_report.html
          retention-days: 90
